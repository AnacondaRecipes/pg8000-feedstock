{% set name = "pg8000" %}
{% set version = "1.31.5" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 46ebb03be52b7a77c03c725c79da2ca281d6e8f59577ca66b17c9009618cae78

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<39]

requirements:
  host:
    - python
    - pip
    - hatchling
    - versioningit >=3.3.0
  run:
    - python
    - scramp >=1.4.5
    - python-dateutil >=2.8.2

# Skip tests that requires a working PostgreSQL infrastructure
{%- set ignore_dirs = ["dbapi", "legacy", "native"] %}
# Skip due to FileNotFoundError
{%- set ignore_test = "not test_readme" %}

test:
  imports:
    - pg8000
  source_files:
    - test
  commands:
    - pip check
    - pytest -v test {% for d in ignore_dirs %}--ignore=test/{{ d }} {% endfor %}-k "{{ ignore_test }}"
  requires:
    - pip
    - pytest

about:
  home: https://codeberg.org/tlocke/pg8000
  
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: PostgreSQL interface library
  description: |
    pg8000 is a pure-Python PostgreSQL driver that complies with DB-API 2.0.
    pg8000's name comes from the belief that it is probably about the 8000th
    PostgreSQL interface for Python.
  dev_url: https://codeberg.org/tlocke/pg8000
  doc_url: https://codeberg.org/tlocke/pg8000/src/branch/main/README.md

extra:
  recipe-maintainers:
    - nicolas-geniteau
    - maximerihouey
    - ncolomer
